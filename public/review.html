<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Review | Business Verbeteraars</title>
    <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Outfit:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/favicon-v2.svg">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: #111;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        /* ── Top bar ── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 24px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            flex-shrink: 0;
            height: 52px;
        }
        .top-bar h1 { font-size: 16px; font-weight: 700; color: #A8D4E6; letter-spacing: 1px; }
        .progress-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .progress-bar {
            width: 200px;
            height: 6px;
            background: #0f3460;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #0081C6;
            border-radius: 3px;
            transition: width 0.3s;
        }
        .progress-text { font-size: 13px; color: #888; font-weight: 600; }
        .score { font-size: 13px; color: #555; }
        .score .yes { color: #22c55e; }
        .score .no { color: #ef4444; }

        /* ── Main ── */
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            padding: 20px;
            overflow: hidden;
        }

        /* ── Canvas ── */
        #canvasWrapper {
            position: relative;
            background: #1a1a1a;
            border-radius: 12px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
            overflow: hidden;
            flex-shrink: 0;
        }
        #canvasScaleContainer { transform-origin: top left; }

        /* ── Info panel ── */
        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 260px;
            flex-shrink: 0;
        }
        .slide-info {
            background: #16213e;
            border-radius: 10px;
            padding: 16px;
        }
        .slide-info .label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }
        .slide-info .value { font-size: 15px; color: #A8D4E6; font-weight: 600; margin-top: 4px; }
        .slide-info .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .tag {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .tag-layout { background: rgba(0,129,198,0.2); color: #A8D4E6; }
        .tag-count { background: rgba(191,106,1,0.2); color: #e0a050; }

        /* ── Buttons ── */
        .btn-row {
            display: flex;
            gap: 12px;
        }
        .vote-btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .vote-btn:active { transform: scale(0.96); }
        .btn-yes { background: #166534; color: #22c55e; }
        .btn-yes:hover { background: #15803d; }
        .btn-no { background: #7f1d1d; color: #ef4444; }
        .btn-no:hover { background: #991b1b; }
        .btn-skip { background: #1e293b; color: #64748b; }
        .btn-skip:hover { background: #334155; }

        .shortcut {
            font-size: 11px;
            padding: 2px 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            font-weight: 400;
        }
        .btn-row-secondary {
            display: flex;
            gap: 8px;
        }
        .btn-small {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-back-nav { background: #1e293b; color: #64748b; }
        .btn-back-nav:hover { background: #334155; }

        /* ── Feedback field ── */
        .feedback-wrap { width: 100%; }
        .feedback-wrap textarea {
            width: 100%;
            height: 60px;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            color: #e0e0e0;
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            padding: 10px;
            resize: none;
        }
        .feedback-wrap textarea:focus {
            outline: none;
            border-color: #0081C6;
        }
        .feedback-wrap textarea::placeholder { color: #444; }

        /* ── Done screen ── */
        .done-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            text-align: center;
            padding: 40px;
        }
        .done-screen h2 { font-size: 28px; color: #A8D4E6; }
        .done-screen .stats { font-size: 16px; color: #888; }
        .done-screen textarea {
            width: 600px;
            max-width: 90vw;
            height: 300px;
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 10px;
            color: #e0e0e0;
            font-family: monospace;
            font-size: 11px;
            padding: 16px;
            resize: vertical;
        }
        .btn-copy {
            padding: 12px 32px;
            border: none;
            border-radius: 10px;
            background: #0081C6;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-copy:hover { background: #006da8; }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #0081C6;
            color: #fff;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: transform 0.3s;
            z-index: 99;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>

<body>

    <!-- Top Bar -->
    <div class="top-bar">
        <h1>DESIGN REVIEW</h1>
        <div class="progress-wrap">
            <div class="score">
                <span class="yes" id="yesCount">0</span> /
                <span class="no" id="noCount">0</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <span class="progress-text" id="progressText">0 / 50</span>
        </div>
    </div>

    <!-- Review view -->
    <div class="main" id="reviewView">
        <div id="canvasWrapper">
            <div id="canvasScaleContainer">
                <canvas id="slideCanvas" width="1080" height="1080"></canvas>
            </div>
        </div>

        <div class="info-panel">
            <div class="slide-info">
                <div class="label">Design</div>
                <div class="value" id="designTitle">—</div>
                <div class="tags" id="designTags"></div>
            </div>
            <div class="slide-info">
                <div class="label">Blokken</div>
                <div class="value" id="designBlokken">—</div>
            </div>
            <div class="feedback-wrap">
                <textarea id="feedbackInput" placeholder="Wat is goed/fout? (optioneel)" rows="2"></textarea>
            </div>
            <div class="btn-row">
                <button class="vote-btn btn-yes" onclick="vote('yes')">Ja <span class="shortcut">J</span></button>
                <button class="vote-btn btn-no" onclick="vote('no')">Nee <span class="shortcut">N</span></button>
            </div>
            <div class="btn-row-secondary">
                <button class="btn-small btn-back-nav" onclick="goBack()">Vorige</button>
                <button class="btn-small btn-skip" onclick="vote('skip')">Skip <span class="shortcut">S</span></button>
            </div>
        </div>
    </div>

    <!-- Done screen -->
    <div class="done-screen" id="doneScreen">
        <h2>Review klaar!</h2>
        <div class="stats" id="doneStats"></div>
        <textarea id="resultJson" readonly></textarea>
        <button class="btn-copy" onclick="copyResult()">Kopieer JSON</button>
    </div>

    <div class="toast" id="toast"></div>

    <!-- Canvas editor -->
    <script src="/canvas-editor.js"></script>

    <script>
        // ── 50 Design variations ──────────────────────────────────────
        const LAYOUTS = ['grid', 'hero', 'sidebar', 'diagonal', 'bottom-row', 'pyramid', 'scattered', 'stack', 'overlap'];

        const TOPICS = [
            // [subtitle, title, blokken]
            { sub: '~~~ SWOT ANALYSE ~~~', title: 'Ken jij je eigen zwaktes?', blokken: ['Sterktes', 'Zwaktes', 'Kansen', 'Bedreigingen'] },
            { sub: '~~~ GROEI ~~~', title: 'Waarom groeit je bedrijf niet meer?', blokken: ['Omzet', 'Kosten', 'Winst', 'Cashflow'] },
            { sub: '~~~ LEIDERSCHAP ~~~', title: 'Leidinggeven is loslaten', blokken: ['Richting', 'Vertrouwen', 'Lef', 'Rust'] },
            { sub: '~~~ KLANTRELATIES ~~~', title: 'Begrijp je klant of denk je dat?', blokken: ['Behoefte', 'Ervaring', 'Loyaliteit'] },
            { sub: '~~~ FINANCIEEL ~~~', title: 'Weet jij waar je geld blijft?', blokken: ['Inkomsten', 'Uitgaven', 'Marge', 'Investering'] },
            { sub: '~~~ TEAM ~~~', title: 'Een sterk team bouw je niet met regels', blokken: ['Talent', 'Motivatie', 'Cultuur', 'Groei'] },
            { sub: '~~~ BESLUITVORMING ~~~', title: 'Twijfel is ook een keuze', blokken: ['Ja?', 'Nee?', 'Misschien?'] },
            { sub: '~~~ EENVOUD ~~~', title: 'Minder doen, meer bereiken', blokken: ['Plan', 'Focus', 'Actie'] },
            { sub: '~~~ LEVENSCYCLUS ~~~', title: 'Waar sta jij nu?', blokken: ['Starten', 'Stabiliseren', 'Groeien', 'Vernieuwen', 'Overdragen'] },
            { sub: '~~~ STRATEGIE ~~~', title: 'Strategie zonder uitvoering is een droom', blokken: ['Visie', 'Plan', 'Actie', 'Resultaat'] },
            { sub: '~~~ PROCESVERBETERING ~~~', title: 'Waar zit de bottleneck?', blokken: ['Analyse', 'Ontwerp', 'Implementatie'] },
            { sub: '~~~ VERANDERING ~~~', title: 'Veranderen begint bij accepteren', blokken: ['Ontkenning', 'Weerstand', 'Acceptatie', 'Groei'] },
            { sub: '~~~ VERKOOP ~~~', title: 'Verkopen is helpen kiezen', blokken: ['Contact', 'Vertrouwen', 'Voorstel', 'Sluiting'] },
            { sub: '~~~ FOCUS ~~~', title: 'Alles doen is niets doen', blokken: ['Stoppen', 'Starten'] },
            { sub: '~~~ MARKETING ~~~', title: 'Ken je publiek of schreeuw je in het donker?', blokken: ['Doelgroep', 'Boodschap', 'Kanaal'] },
            { sub: '~~~ INNOVATIE ~~~', title: 'Innovatie is niet alleen technologie', blokken: ['Probleem', 'Idee', 'Test', 'Schaal'] },
            { sub: '~~~ MINDSET ~~~', title: 'Je grootste concurrent ben je zelf', blokken: ['Angst', 'Twijfel', 'Moed', 'Actie'] },
            { sub: '~~~ DELEGEREN ~~~', title: 'Durf je los te laten?', blokken: ['Controle', 'Vertrouwen', 'Vrijheid'] },
            { sub: '~~~ PRIORITEITEN ~~~', title: 'Niet alles is urgent', blokken: ['Urgent', 'Belangrijk', 'Parkeren', 'Schrappen'] },
            { sub: '~~~ BALANS ~~~', title: 'Werk en leven zijn geen tegenpolen', blokken: ['Werk', 'Gezin', 'Gezondheid'] },
        ];

        // Generate 50 unique combinations
        const ALL_DESIGNS = [];
        function generateDesigns() {
            const used = new Set();
            // First: each layout gets at least one design
            for (let li = 0; li < LAYOUTS.length; li++) {
                const ti = li % TOPICS.length;
                const key = `${li}-${ti}`;
                if (!used.has(key)) {
                    used.add(key);
                    ALL_DESIGNS.push({ layoutIdx: li, topicIdx: ti });
                }
            }
            // Fill to 50 with varied combos
            let attempts = 0;
            while (ALL_DESIGNS.length < 50 && attempts < 500) {
                const li = Math.floor(Math.random() * LAYOUTS.length);
                const ti = Math.floor(Math.random() * TOPICS.length);
                const key = `${li}-${ti}`;
                if (!used.has(key)) {
                    // Check blokken count compatibility
                    const topic = TOPICS[ti];
                    const layout = LAYOUTS[li];
                    const count = topic.blokken.length;
                    // Skip incompatible: overlap needs 3+, grid-4 needs 4, etc.
                    let ok = true;
                    if (layout === 'overlap' && count < 3) ok = false;
                    if (layout === 'grid' && count < 2) ok = false;
                    if (ok) {
                        used.add(key);
                        ALL_DESIGNS.push({ layoutIdx: li, topicIdx: ti });
                    }
                }
                attempts++;
            }
            // Shuffle
            for (let i = ALL_DESIGNS.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [ALL_DESIGNS[i], ALL_DESIGNS[j]] = [ALL_DESIGNS[j], ALL_DESIGNS[i]];
            }
        }
        generateDesigns();

        function buildSlideData(designIdx) {
            const d = ALL_DESIGNS[designIdx];
            const layout = LAYOUTS[d.layoutIdx];
            const topic = TOPICS[d.topicIdx];
            return {
                slide: {
                    type: 'intro',
                    id: 'slide-1',
                    content: {
                        subtitle: topic.sub,
                        title: topic.title,
                        cta: 'Swipe voor het antwoord',
                        blokken: topic.blokken,
                    },
                    visuals: { style: 'cover', layout: layout },
                },
                layout: layout,
                topic: topic,
            };
        }

        // ── State ──
        let currentIdx = 0;
        let results = []; // { idx, layout, topic, blokken, blokkenCount, vote }
        let reviewEditor = null;

        // ── Init ──
        async function init() {
            reviewEditor = new SlideCanvasEditor('slideCanvas', null, null);

            reviewEditor._updateCanvasScale = function() {
                const wrapper = document.getElementById('canvasWrapper');
                if (!wrapper) return;
                const area = wrapper.parentElement;
                const availH = area.clientHeight - 40;
                const availW = area.clientWidth - 340;
                const scale = Math.min(availW / 1080, availH / 1080, 1);
                const container = document.getElementById('canvasScaleContainer');
                if (container) {
                    container.style.transform = `scale(${scale})`;
                    container.style.width = '1080px';
                    container.style.height = '1080px';
                }
                wrapper.style.width = Math.round(1080 * scale) + 'px';
                wrapper.style.height = Math.round(1080 * scale) + 'px';
            };

            // Pre-fill results
            for (let i = 0; i < ALL_DESIGNS.length; i++) {
                results.push({ idx: i, vote: null });
            }

            await showDesign(0);
            window.addEventListener('resize', () => reviewEditor._updateCanvasScale());

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (document.getElementById('doneScreen').style.display === 'flex') return;
                if (document.activeElement.tagName === 'TEXTAREA') return;
                const key = e.key.toLowerCase();
                if (key === 'j' || key === 'arrowright') vote('yes');
                else if (key === 'n' || key === 'arrowleft') vote('no');
                else if (key === 's' || key === 'arrowdown') vote('skip');
                else if (key === 'backspace' || key === 'arrowup') goBack();
            });
        }

        async function showDesign(idx) {
            if (idx >= ALL_DESIGNS.length) return showDone();

            currentIdx = idx;
            const { slide, layout, topic } = buildSlideData(idx);

            const carouselData = {
                title: 'Review',
                topic: 'review',
                postBody: '',
                slides: [slide],
                metadata: { author: 'Review', date: new Date().toISOString() },
            };

            await reviewEditor.loadSlides(carouselData);
            reviewEditor._updateCanvasScale();

            // Update info
            document.getElementById('designTitle').textContent = `#${idx + 1} — ${topic.sub.replace(/~/g, '').trim()}`;
            document.getElementById('designTags').innerHTML = `
                <span class="tag tag-layout">${layout}</span>
                <span class="tag tag-count">${topic.blokken.length} blokken</span>
            `;
            document.getElementById('designBlokken').textContent = topic.blokken.join(' · ');

            // Restore feedback if going back
            const existing = results[idx];
            document.getElementById('feedbackInput').value = (existing && existing.feedback) || '';

            updateProgress();
        }

        function vote(v) {
            const d = ALL_DESIGNS[currentIdx];
            const topic = TOPICS[d.topicIdx];
            const fb = document.getElementById('feedbackInput').value.trim();
            results[currentIdx] = {
                idx: currentIdx,
                layout: LAYOUTS[d.layoutIdx],
                blokkenCount: topic.blokken.length,
                topic: topic.sub.replace(/~/g, '').trim(),
                vote: v,
                feedback: fb || null,
            };
            document.getElementById('feedbackInput').value = '';
            showDesign(currentIdx + 1);
        }

        function goBack() {
            if (currentIdx > 0) showDesign(currentIdx - 1);
        }

        function updateProgress() {
            const voted = results.filter(r => r.vote !== null).length;
            const total = ALL_DESIGNS.length;
            const yesC = results.filter(r => r.vote === 'yes').length;
            const noC = results.filter(r => r.vote === 'no').length;

            document.getElementById('progressFill').style.width = `${(voted / total) * 100}%`;
            document.getElementById('progressText').textContent = `${currentIdx + 1} / ${total}`;
            document.getElementById('yesCount').textContent = yesC;
            document.getElementById('noCount').textContent = noC;
        }

        function showDone() {
            document.getElementById('reviewView').style.display = 'none';
            document.getElementById('doneScreen').style.display = 'flex';

            const yesC = results.filter(r => r.vote === 'yes').length;
            const noC = results.filter(r => r.vote === 'no').length;
            const skipC = results.filter(r => r.vote === 'skip').length;

            document.getElementById('doneStats').textContent = `${yesC} ja · ${noC} nee · ${skipC} overgeslagen`;

            // Build compact JSON
            const compact = {
                date: new Date().toISOString().split('T')[0],
                total: ALL_DESIGNS.length,
                yes: yesC,
                no: noC,
                skip: skipC,
                // Per-layout summary
                layoutScores: {},
                // Individual results (compact: "layout|count|vote")
                votes: [],
            };

            // Layout scores
            const layoutMap = {};
            results.forEach(r => {
                if (!r.vote || r.vote === 'skip') return;
                if (!layoutMap[r.layout]) layoutMap[r.layout] = { yes: 0, no: 0 };
                layoutMap[r.layout][r.vote]++;
            });
            compact.layoutScores = layoutMap;

            // Compact votes with optional feedback
            results.forEach(r => {
                if (r.vote === 'skip' || !r.vote) return;
                let line = `${r.layout}|${r.blokkenCount}|${r.topic}|${r.vote}`;
                if (r.feedback) line += `|${r.feedback}`;
                compact.votes.push(line);
            });

            const json = JSON.stringify(compact, null, 2);
            document.getElementById('resultJson').value = json;
            updateProgress();
        }

        function copyResult() {
            const el = document.getElementById('resultJson');
            el.select();
            navigator.clipboard.writeText(el.value).then(() => {
                showToast('JSON gekopieerd!');
            });
        }

        function showToast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2000);
        }

        init();
    </script>
</body>

</html>
