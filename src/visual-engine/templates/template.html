<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide Template</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap"
        rel="stylesheet">
    <!-- Verb font wordt inline base64 ingevoegd door VisualRenderer.init() -->
    <style>
        :root {
            /* WIDEA HUISSTIJL 2025 */
            --primary-color: #3D2E32;   /* Grijs 1 / Black 5C */
            --secondary-color: #0081C6; /* Process Blue C — handtekening Widea */
            --accent-color: #BF6A01;    /* Aardrood — accent */
            --grey2: #56565A;           /* Pantone Cool Grey 11C */
            --grey3: #989798;           /* Pantone Cool Grey 7C */
            --grey4: #D0CFCC;           /* Pantone Cool Grey 2C */
            --paper-color: #F6F6F6;
            --bg-color: #E5E5E5;
            --font-main: "Verb", "Segoe UI", Helvetica, Arial, sans-serif;
            --font-hand: "Caveat", cursive;

            /* Canvas 1080x1080 (LinkedIn 1:1) */
            --canvas-width: 1080px;
            --canvas-height: 1080px;
        }

        @page {
            size: 1080px 1080px;
            margin: 0;
        }

        body {
            /* Width fixed for PDF, height auto grows with slides */
            width: var(--canvas-width);
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: var(--font-main);
            display: block;
            box-sizing: border-box;
        }

        .slide-wrapper {
            width: var(--canvas-width);
            height: var(--canvas-height);
            display: flex;
            align-items: center;
            justify-content: center;
            page-break-after: always;
            /* Force PDF page break */
            break-after: page;
            position: relative;
        }

        /* HARD ZONE: The Paper */
        .slide-container {
            width: 940px;
            height: 940px;
            background: var(--paper-color);
            position: relative;
            border-radius: 180px 12px 160px 12px/12px 160px 12px 180px;
            box-shadow: 4px 8px 25px rgba(0, 0, 0, 0.15);
            transform: rotate(-1deg);
            overflow: hidden;

            /* ZONES GRID SYSTEM */
            display: grid;
            padding: 50px 50px;
            box-sizing: border-box;

            grid-template-columns: repeat(12, 1fr);
            grid-template-rows:
                min-content
                1fr
                min-content
                80px
            ;
            gap: 12px;
        }

        /* --- ZONES --- */
        .header-zone {
            grid-column: 2 / span 10;
            grid-row: 1;
            text-align: center;
            z-index: 10;
        }

        .main-text-zone {
            grid-column: 2 / span 10;
            grid-row: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            /* Center vertically by default */
            align-items: center;
            z-index: 10;
            max-width: 100%;
        }

        /* Visual Zone - Hidden by default, shown in Template A/C */
        .visual-zone {
            grid-column: 2 / span 10;
            /* Wider for potential full width usage */
            grid-row: 3;
            display: none;
            /* Active templates will override this */
            justify-content: center;
            align-items: center;
            min-height: 100px;
            z-index: 5;
            margin-bottom: 10px;
        }

        /* Visual Placeholder Styling (Now supports Image Injection) */
        .visual-placeholder {
            width: 100%;
            height: 100%;
            min-height: 200px;
            background: #e0f7fa;
            border: none;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.05);
        }

        /* Specific Outro Styles */
        .outro-title {
            font-family: var(--font-main);
            font-size: 52px;
            font-weight: 800;
            font-style: italic;
            color: var(--secondary-color);
            margin: 0;
            text-transform: uppercase;
            line-height: 1.1;
            letter-spacing: 2px;
            text-align: center;
        }

        .outro-spacer {
            height: 30px;
            width: 100%;
        }

        .outro-url {
            font-family: var(--font-main);
            font-size: 22px;
            font-weight: 900;
            color: var(--secondary-color);
            text-decoration: none;
            margin-top: 12px;
            display: block;
            font-style: normal;
        }


        /* CTA Zone - Rechts midden, in de padding buiten de content grid */
        .cta-zone {
            position: absolute;
            z-index: 30;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            pointer-events: none;
        }

        /* Footer Zone - Grid Based */
        .footer-zone {
            grid-column: 1 / -1;
            grid-row: 4;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding-bottom: 20px;
            z-index: 20;
            /* Debug: border-top: 1px solid red; */
        }

        .footer-left-content {
            display: flex;
            align-items: flex-end;
        }

        .footer-right-content {
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
        }

        /* Footer Logo Only */
        .footer-logo-img {
            height: 45px;
            display: block;
        }

        /* --- TEMPLATES --- */

        /* Template A: Intro (Title + Visual) */
        .template-a .main-text-zone {
            justify-content: flex-end;
            /* Push title up slightly */
            padding-bottom: 20px;
        }

        .template-a .visual-zone {
            display: flex;
            min-height: 200px;
            grid-column: 3 / span 8;
        }

        .template-a .header-text {
            color: var(--secondary-color);
        }

        /* Template B: Statement (Text Focus) */
        .template-b .main-text-zone {
            justify-content: center;
            grid-row: 2 / span 2;
            /* Take up visual space too */
        }

        /* Template C: Outro (CTA Focus) */
        .template-c .main-text-zone {
            justify-content: center;
            /* Center Content Block */
            align-items: center;
            text-align: center;
            padding-top: 0;
            gap: 60px;
            /* Space between elements */
        }

        .template-c .visual-zone {
            display: flex;
            /* Position Bottom Left relative to logic, but visually we place it absolutely/fixed for this specific design */
            justify-content: center;
            align-items: flex-end;
            margin-top: auto;
            margin-bottom: 0;
            min-height: auto;
            /* Override grid placement for specific look? No, keep logic. */
        }

        /* --- TYPOGRAPHY --- */
        h1 {
            font-family: var(--font-main);
            font-size: 48px;
            line-height: 1.15;
            font-weight: 800;
            font-style: italic;
            text-transform: uppercase;
            color: var(--secondary-color);
            margin: 0;
            text-align: center;
            word-break: break-word;
        }

        /* Specific Outro Styles */
        .outro-title {
            font-family: var(--font-main);
            font-size: 52px;
            font-weight: 400;
            font-style: italic;
            color: var(--secondary-color);
            margin: 0;
            text-transform: uppercase;
            line-height: 1.2;
        }

        .outro-subtitle {
            font-family: var(--font-main);
            font-size: 46px;
            font-weight: 400;
            font-style: italic;
            color: var(--secondary-color);
            margin: 0;
            text-transform: uppercase;
            line-height: 1.2;
            margin-top: 30px;
        }

        .outro-url {
            font-family: var(--font-main);
            font-size: 28px;
            font-weight: 900;
            color: var(--secondary-color);
            text-decoration: none;
            margin-top: 12px;
            display: block;
        }

        .header-text {
            font-family: var(--font-hand);
            font-size: 24px;
            color: var(--secondary-color);
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 6px;
            display: block;
        }

        .body-text {
            font-family: var(--font-main);
            font-size: 38px;
            line-height: 1.35;
            color: var(--secondary-color);
            font-weight: 300;
            font-style: italic;
            white-space: pre-wrap;
            text-align: center;
        }

        .body-text strong {
            font-family: var(--font-main);
            font-weight: 800;
            font-style: italic;
            color: var(--secondary-color);
        }

        /* --- FOOTER ELEMENTS --- */

        .citation-text {
            font-family: var(--font-hand);
            font-size: 28px;
            font-weight: 700;
            color: var(--secondary-color);
            max-width: 500px;
            line-height: 1.2;
        }

        /* CTA Badge / URL */
        /* CTA Badge — verticaal: pijl boven wijzend naar beneden, tekst eronder */
        .cta-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .cta-badge-arrow {
            width: 30px;
            height: 50px;
        }

        .cta-badge-arrow path {
            fill: none;
            stroke: #333;
            stroke-width: 8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .cta-badge-text {
            font-family: var(--font-hand);
            font-size: 32px;
            font-weight: 700;
            color: #333;
            line-height: 1;
            text-align: center;
        }


        /* --- LIKE & COMMENT (OUTRO) --- */
        /* Positioned Bottom Left-ish */
        .like-comment-container {
            position: absolute;
            bottom: 90px;
            left: 100px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .like-comment-text {
            font-family: var(--font-hand);
            font-size: 42px;
            font-weight: 700;
            color: #333;
            line-height: 1.1;
            text-align: right;
        }

        .like-comment-arrow {
            width: 40px;
            height: 60px;
            margin-top: 5px;
        }

        .like-comment-arrow path {
            fill: none;
            stroke: #333;
            stroke-width: 8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>

<body>
    <!-- Carousel Root injected via JS -->
    <div id="carousel-root">
        <!-- ZONES Injected Here -->
    </div>
</body>

</html>
